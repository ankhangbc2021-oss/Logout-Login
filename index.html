<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập · AuthFlow</title>
    <meta name="description" content="Đăng nhập hoặc tạo tài khoản mới tại AuthFlow – nền tảng quản lý tài khoản an toàn và hiện đại.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated background blobs -->
    <div class="bg-blobs" aria-hidden="true">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="auth-wrapper">
        <div class="auth-card" id="auth-card">

            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon" aria-hidden="true">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <span class="brand-name">AuthFlow</span>
            </div>

            <!-- ===== LOGIN FORM ===== -->
            <div class="form-panel" id="login-panel">
                <div class="form-header">
                    <h1 class="form-title">Chào mừng trở lại</h1>
                    <p class="form-subtitle">Đăng nhập để tiếp tục hành trình của bạn</p>
                </div>

                <form id="login-form" novalidate>

                    <!-- Email -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            </span>
                            <input type="email" id="login-email" class="input" placeholder=" " autocomplete="email" required>
                            <label for="login-email">Email</label>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <input type="password" id="login-password" class="input" placeholder=" " autocomplete="current-password" required>
                            <label for="login-password">Mật khẩu</label>
                            <button type="button" class="toggle-password" aria-label="Hiện/ẩn mật khẩu" data-target="login-password">
                                <svg class="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrap">
                            <input type="checkbox" id="remember-me">
                            <span class="checkmark"></span>
                            <span>Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-primary" id="login-btn">
                        <span class="btn-text">Đăng nhập</span>
                        <span class="btn-loader" aria-hidden="true"></span>
                    </button>

                    <div class="divider"><span>hoặc tiếp tục với</span></div>

                    <div class="social-btns">
                        <button type="button" class="btn-social" id="google-btn" aria-label="Đăng nhập bằng Google">
                            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.27 9.76A7.08 7.08 0 0 1 12 4.9c1.76 0 3.35.64 4.59 1.7l3.42-3.42A11.93 11.93 0 0 0 12 1C8.13 1 4.73 3.01 2.69 6.07l2.58 3.69z"/><path fill="#34A853" d="M16.04 18.01A7.06 7.06 0 0 1 12 19.1c-2.93 0-5.44-1.78-6.63-4.35l-2.63 3.72C4.66 21 8.12 23 12 23c2.97 0 5.73-1.04 7.82-2.76l-3.78-2.23z"/><path fill="#4A90D9" d="M19.82 20.24A11.94 11.94 0 0 0 23 13c0-.83-.09-1.64-.25-2.43H12v4.86h6.18a5.28 5.28 0 0 1-2.32 3.42l3.96 1.39z"/><path fill="#FBBC05" d="M5.37 14.75A7.14 7.14 0 0 1 4.9 12c0-.96.18-1.89.47-2.75L2.69 5.56A11.93 11.93 0 0 0 1 12c0 1.92.45 3.73 1.24 5.34l3.13-2.59z"/></svg>
                            Google
                        </button>
                        <button type="button" class="btn-social" id="github-btn" aria-label="Đăng nhập bằng GitHub">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
                            GitHub
                        </button>
                    </div>

                    <p class="switch-text">Chưa có tài khoản? <button type="button" class="switch-link" id="show-register-btn">Đăng ký ngay</button></p>
                </form>
            </div>

            <!-- ===== REGISTER FORM ===== -->
            <div class="form-panel hidden" id="register-panel">
                <div class="form-header">
                    <h1 class="form-title">Tạo tài khoản</h1>
                    <p class="form-subtitle">Tham gia cùng hàng nghìn người dùng của chúng tôi</p>
                </div>

                <form id="register-form" novalidate>

                    <!-- Full name -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </span>
                            <input type="text" id="reg-name" class="input" placeholder=" " autocomplete="name" required>
                            <label for="reg-name">Họ và tên</label>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            </span>
                            <input type="email" id="reg-email" class="input" placeholder=" " autocomplete="email" required>
                            <label for="reg-email">Email</label>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <!-- Password + strength -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                            </span>
                            <input type="password" id="reg-password" class="input" placeholder=" " autocomplete="new-password" required>
                            <label for="reg-password">Mật khẩu</label>
                            <button type="button" class="toggle-password" aria-label="Hiện/ẩn mật khẩu" data-target="reg-password">
                                <svg class="eye-open" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                <svg class="eye-closed" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                            </button>
                        </div>
                        <!-- Strength bar sits outside input-wrap so it doesn't affect label centering -->
                        <div class="strength-bar" aria-label="Độ mạnh mật khẩu">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <!-- Confirm password -->
                    <div class="input-group">
                        <div class="input-wrap">
                            <span class="input-icon" aria-hidden="true">
                                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg>
                            </span>
                            <input type="password" id="reg-confirm" class="input" placeholder=" " autocomplete="new-password" required>
                            <label for="reg-confirm">Xác nhận mật khẩu</label>
                        </div>
                        <small class="error-text" role="alert"></small>
                    </div>

                    <label class="checkbox-wrap terms-wrap">
                        <input type="checkbox" id="agree-terms" required>
                        <span class="checkmark"></span>
                        <span>Tôi đồng ý với <a href="#" class="link">Điều khoản dịch vụ</a></span>
                    </label>

                    <button type="submit" class="btn-primary" id="register-btn">
                        <span class="btn-text">Tạo tài khoản</span>
                        <span class="btn-loader" aria-hidden="true"></span>
                    </button>

                    <p class="switch-text">Đã có tài khoản? <button type="button" class="switch-link" id="show-login-btn">Đăng nhập ngay</button></p>
                </form>
            </div>

        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
